<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日日志</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
</head>
<body>
  <div class="app">

    <aside class="sidebar">
      <div class="sidebar-header">
        <i class="ti ti-notebook" aria-hidden="true"></i>
        <span>每日日志</span>
      </div>

      <div class="cal-nav">
        <button id="prev" class="icon-btn" aria-label="上一月"><i class="ti ti-chevron-left"></i></button>
        <span id="month-label" class="month-label"></span>
        <button id="next" class="icon-btn" aria-label="下一月"><i class="ti ti-chevron-right"></i></button>
      </div>

      <div class="weekdays">
        <span>日</span><span>一</span><span>二</span>
        <span>三</span><span>四</span><span>五</span><span>六</span>
      </div>
      <div class="cal-grid" id="cal-grid"></div>

      <div class="sidebar-footer">
        <div class="stats" id="stats"></div>
        <div class="sidebar-actions">
          <button class="text-btn" id="export-btn" title="导出所有记录为 JSON">
            <i class="ti ti-download"></i> 导出备份
          </button>
          <label class="text-btn" title="从 JSON 文件导入">
            <i class="ti ti-upload"></i> 导入恢复
            <input type="file" id="import-input" accept=".json" style="display:none">
          </label>
          <button class="text-btn" id="sync-btn" title="GitHub Gist 云同步">
            <i class="ti ti-cloud"></i> <span class="sync-label">云同步</span>
          </button>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="main-inner" id="main-inner">
        <div class="empty-state" id="empty-state">
          <i class="ti ti-calendar-plus" style="font-size:48px;color:var(--accent)"></i>
          <p>从左侧选择一天，开始记录</p>
        </div>

        <div class="day-panel" id="day-panel" style="display:none">
          <div class="day-header">
            <div>
              <h1 id="panel-date"></h1>
              <span id="panel-weekday" class="weekday-tag"></span>
            </div>
            <div class="header-actions">
              <span class="saved-badge" id="saved-badge"><i class="ti ti-check"></i> 已保存</span>
              <button class="btn-primary" id="save-btn">
                <i class="ti ti-device-floppy"></i> 保存
              </button>
            </div>
          </div>

          <section class="section">
            <label class="section-label" for="quote-input">
              <i class="ti ti-quote"></i> 今日警句
            </label>
            <textarea id="quote-input" class="quote-input" rows="2"
              placeholder="写下今日警句或座右铭…"></textarea>
          </section>

          <section class="section">
            <div class="section-label">
              <i class="ti ti-list-check"></i> 今日七件事
            </div>
            <div class="tasks" id="tasks-wrap"></div>
          </section>

          <section class="section reflect-grid">
            <div class="reflect-col">
              <label class="section-label" for="r-reflect">
                <i class="ti ti-bulb"></i> 今日反思
              </label>
              <textarea id="r-reflect" class="reflect-area"
                placeholder="今天有何收获或感悟…" rows="6"></textarea>
            </div>
            <div class="reflect-col">
              <label class="section-label" for="r-process">
                <i class="ti ti-route"></i> 事情经过
              </label>
              <textarea id="r-process" class="reflect-area"
                placeholder="今天发生了什么事…" rows="6"></textarea>
            </div>
            <div class="reflect-col">
              <label class="section-label" for="r-action">
                <i class="ti ti-adjustments"></i> 改进措施
              </label>
              <textarea id="r-action" class="reflect-area"
                placeholder="明天如何改进…" rows="6"></textarea>
            </div>
          </section>
        </div>
      </div>
    </main>

  </div>

  <div class="toast" id="toast"></div>

  <!-- 云同步设置 -->
  <div class="modal-overlay" id="sync-modal" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2><i class="ti ti-cloud"></i> 云同步设置</h2>
        <button class="icon-btn" id="sync-close" aria-label="关闭"><i class="ti ti-x"></i></button>
      </div>
      <p class="modal-desc">
        将日志保存到你的 GitHub <strong>私密 Gist</strong>，实现跨设备、不依赖本机浏览器的持久化。
        数据只存于你自己的 GitHub 账户；Token 仅保存在本浏览器，不会上传或写入代码仓库。
      </p>

      <label class="field-label" for="sync-token">GitHub Token（需勾选 <code>gist</code> 权限）</label>
      <input type="password" id="sync-token" class="field-input" placeholder="ghp_… 或 github_pat_…" autocomplete="off">
      <a class="field-hint" href="https://github.com/settings/tokens/new?scopes=gist&description=daily-journal"
         target="_blank" rel="noopener">→ 点此创建仅含 gist 权限的 Token</a>

      <label class="field-label" for="sync-gistid">Gist ID（已有则填写；留空则新建）</label>
      <input type="text" id="sync-gistid" class="field-input" placeholder="留空 → 点「新建并连接」自动创建" autocomplete="off">

      <div class="modal-actions">
        <button class="text-btn" id="sync-create"><i class="ti ti-plus"></i> 新建并连接</button>
        <button class="btn-primary" id="sync-connect"><i class="ti ti-plug"></i> 连接</button>
      </div>

      <div class="sync-status" id="sync-status"></div>
      <div class="sync-connected-actions" id="sync-connected-actions" style="display:none">
        <button class="text-btn" id="sync-now"><i class="ti ti-refresh"></i> 立即同步</button>
        <button class="text-btn danger" id="sync-disconnect"><i class="ti ti-plug-off"></i> 断开云同步</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
